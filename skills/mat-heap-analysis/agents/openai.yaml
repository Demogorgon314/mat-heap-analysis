interface:
  display_name: "MAT Heap Analysis"
  short_description: "Analyze Java heap dumps with the bundled MAT CLI"
  default_prompt: "Use $mat-heap-analysis to inspect a Java heap dump with the bundled MAT CLI. Prefer doctor, index, overview, and suspects first, and rely on defaults unless the analysis spans multiple directories."

policy:
  allow_implicit_invocation: true
